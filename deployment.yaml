apiVersion: apps/v1
kind: Deployment
metadata:
  name: bend-racing-web
  namespace: bend-racing-web
  labels:
    app: bend-racing-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bend-racing-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: bend-racing-web
    spec:
      containers:
        - name: nginx
          # Image Docker Hub (multi-arch: amd64 + arm64) - remplacer USER par ton Docker Hub username
          image: docker.io/noaprosper/bend-racing-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
