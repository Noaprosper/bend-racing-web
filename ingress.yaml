apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bend-racing-web
  namespace: bend-racing-web
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bend-racing-web
                port:
                  number: 80
